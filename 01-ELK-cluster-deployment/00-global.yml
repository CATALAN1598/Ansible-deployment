---
- name: APT update and minimal install
  hosts: all
  become: true
  tasks:
    - name: Update debian
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade full debian
      ansible.builtin.apt:
        upgrade: full

    - name: Install minimal list of packages
      ansible.builtin.apt:
        name: "{{ lookup('file', 'files/apt/lists/default.server.list').split('\n') }}"
        state: present
        update_cache: true

    - name: Replace hosts template for cloud-init
      ansible.builtin.template:
        src: templates/etc_files/hosts.yml.j2
        dest: /etc/cloud/templates/hosts.debian.tmpl
        mode: '0644'
        owner: root
        group: root

    - name: Set FQDN hostname file
      ansible.builtin.template:
        src: templates/etc_files/hostname.yml.j2
        dest: /etc/hostname
        mode: '0644'
        owner: root
        group: root

    - name: Reboot machine to apply cloud configuration
      ansible.builtin.reboot:
        msg: "Initialyze {{ inventory_hostname }}"
