---
server_host: "0.0.0.0"
server_port: "5601"

elastic_host: >-
  [{% for host in groups['db_host'] %}
  "https://{{ hostvars[host]['ansible_host'] }}:9200"
  {% if not loop.last %},
  {% endif %}
  {% endfor %}]

log_level: "debug"
log_file: "/var/log/kibana/kibana.log"
log_type: "file"
log_fmt: "json"

