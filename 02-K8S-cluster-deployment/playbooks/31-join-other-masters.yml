- name: Masters join cluster control plane
  hosts: k8s_other_master
  vars_files:
    - ../group_vars/k8s_hosts.yml
    - ../group_vars/k8s_masters.yml
    - ../group_vars/k8s_other_master.yml
  become: true
  tasks:
    - name: Load join credentials
      ansible.builtin.include_vars:
        file: "../vars/k8s_join_vars.yml"

    - name: kubeadm join masters
      ansible.builtin.command:
        argv:
          - kubeadm
          - join
          - "{{ hostvars[groups['loadbalancers'][0]]['ansible_host'] }}:{{ api_server_src_port }}"
          - "--token"
          - "{{ token }}"
          - "--discovery-token-ca-cert-hash"
          - "{{ cert_hash }}"
          - "--control-plane"
          - "--certificate-key"
          - "{{ certificate_key }}"
        creates: /etc/kubernetes/admin.conf

