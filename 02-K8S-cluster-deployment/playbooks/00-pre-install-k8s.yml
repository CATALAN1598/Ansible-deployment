---
- name: Default configuration for k8s_hosts
  hosts: k8s_hosts
  vars_files:
    - ../group_vars/k8s_hosts.yml
  become: true
  tasks:
    - name: Add local DNS [OPTIONAL]
      ansible.builtin.template:
        src: ../templates/dns_local/hosts.j2
        dest: /etc/cloud/templates/hosts.debian.tmpl
        owner: root
        group: root
        mode: "0644"
      notify: reboot_vm 

    - name: Update system package index before installing kubes commands
      ansible.builtin.apt:
        update_cache: true

    - name: install requirement installation tools
      ansible.builtin.apt:
        name: "{{ lookup('file', '../files/apt/lists/requirement_k8s_installation.list').splitlines() }}"
        state: present

    - name: Check / Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download public signing key for kubernetes package repository
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key"
        dest: "/tmp/Release.key"
        mode: "0755"
        owner: root
        group: root
        timeout: 30

    - name: Dearmor key for the apt keyring
      ansible.builtin.command:
        cmd: /usr/bin/gpg --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/Release.key

    - name: Add kubernetes repository [pkgs.k8s.io]
      ansible.builtin.copy:
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /\n"
        dest: /etc/apt/sources.list.d/kubernetes.list
        owner: root
        group: root
        mode: "0644"

    - name: Force packages version for kubes commands
      ansible.builtin.copy:
        src: ../files/apt/preferences.d/kube_cmd_version
        dest: /etc/apt/preferences.d/kube_cmd_version
        owner: root
        group: root
        mode: '0644'

    - name: Installation of kubes binary
      ansible.builtin.apt:
        name: "{{ lookup('file', '../files/apt/lists/kube_cmd.list').split('\n') }}"
        state: present
        update_cache: true

    - name: Enable ip_forward for the kernel
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        content: "net.ipv4.ip_forward = 1\n"
        owner: root
        group: root
        mode: "0644"
      notify: reload_sysctl

  handlers:
        - name: reboot_vm 
          ansible.builtin.reboot:
            msg: "Initialyze {{ inventory_hostname }}"

        - name: reload_sysctl
          ansible.builtin.command:
            cmd: sysctl --system

